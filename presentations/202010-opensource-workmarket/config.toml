baseURL = "https://carlosthe19916.github.io/presentations/202010-opensource-workmarket"
languageCode = "en-us"
title = "Open Source and the Work market"
disableKinds = ["sitemap", "RSS"]
theme = "hugo-webslides"
themesDir = "../../themes"
tags = ["slide", "presentation", "responsive", "landing page"]
features = ["webslides.js", "pre-made template", "shortcodes"]

[params]
  author = "Carlos Esteban Feria Vila"
  homepage = "carlosthe19916.github.io"


[params.webslides]
  banner = false
  slideshow = true
  vertical = false
  autoslide = false
  changeOnClick = false
  disableLoop = false
  minWheelDelta = 40
  disableNavigateOnScroll = false
  scrollWait = 450
  slideOffset = 50
  hideIndex = false

[markup]
  defaultMarkdownHandler = "blackfriday"
  [markup.goldmark]
    [markup.goldmark.renderer]
    unsafe = true