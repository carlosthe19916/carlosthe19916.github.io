# safelist
branches:
  only:
  - source

git:
  depth: false
  
env:
  global:
    - HUGO_VERSION="0.68.3"
  matrix:
    - YOUR_ENCRYPTED_VARIABLE

install:
  - wget -q https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_Linux-64bit.tar.gz
  - tar xf hugo_extended_${HUGO_VERSION}_Linux-64bit.tar.gz
  - mv hugo ~/bin/

script:
  - hugo --gc --minify
  - for d in presentations/*; do
      hugo --gc --minify --source "$d" --destination ../../public/"$d"
    done

deploy:
  provider: pages
  skip-cleanup: true
  github-token: $GITHUB_TOKEN
  keep-history: true
  local-dir: public
  target_branch: master
  on:
    branch: source